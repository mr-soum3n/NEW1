<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FrostWolfCustom Stickers</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.cart{
font-size:18px;
}

/* GRID */

.products{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:40px;

}

.product{

background:#1c1c1c;
padding:15px;
border-radius:10px;
text-align:center;

}

.product img{
width:100%;
border-radius:8px;
}

.product h3{
margin:10px 0;
}

.price{
color:#00ff88;
font-weight:bold;
}

button{

background:#ff3c00;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
cursor:pointer;

}

button:hover{
background:#ff5c2e;
}

/* FOOTER CART */

.cart-bar{

position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-between;
padding:15px 40px;

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
FrostWolfCustom
</div>

<div class="cart">
🛒 Cart (<span id="cart-count">0</span>)
</div>

</div>


<!-- PRODUCTS -->

<div class="products">


<div class="product">

<img src="images/sticker1.png">

<h3>Ghost Ride R1</h3>

<div class="price">₹69</div>

<button onclick="addToCart('Ghost Ride R1',69)">
Add to Cart
</button>

</div>


<div class="product">

<img src="images/sticker2.png">

<h3>Ghost Ride Ducati</h3>

<div class="price">₹69</div>

<button onclick="addToCart('Ghost Ride Ducati',69)">
Add to Cart
</button>

</div>


<div class="product">

<img src="images/sticker3.png">

<h3>Low Battery</h3>

<div class="price">₹69</div>

<button onclick="addToCart('Low Battery',69)">
Add to Cart
</button>

</div>


<div class="product">

<img src="images/sticker4.png">

<h3>Wolf Racing</h3>

<div class="price">₹69</div>

<button onclick="addToCart('Wolf Racing',69)">
Add to Cart
</button>

</div>


</div>



<!-- CART BAR -->

<div class="cart-bar">

<div>

Items: <span id="cart-count-bottom">0</span>

</div>

<div>

Total: ₹<span id="cart-total">0</span>

</div>

</div>



<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){

cart.push({name,price});

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function updateCart(){

let total = 0;

cart.forEach(item=>{
total += item.price;
});

document.getElementById("cart-total").innerText = total;

document.getElementById("cart-count").innerText = cart.length;

document.getElementById("cart-count-bottom").innerText = cart.length;

}

updateCart();

</script>

</body>
</html>
