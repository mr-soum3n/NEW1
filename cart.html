<h1>Your Cart</h1>

<div id="cart-items"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");

cart.forEach(item => {

container.innerHTML += `
<div class="cart-product">

<img src="${item.image}" width="80">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>
`;

});

</script>
